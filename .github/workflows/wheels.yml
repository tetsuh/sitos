name: Python wheels

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  linux:
    name: Linux CPython wheels
    runs-on: ubuntu-24.04
    env:
      CIBW_BUILD: cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64
      CIBW_ARCHS_LINUX: x86_64
      # GCC 14 image pinned by immutable digest. This retains the manylinux_2_28 ABI policy while
      # providing the C++20 std::format implementation required by the core library.
      CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64@sha256:a61875a2f84cab7df8de222ff12cabc08ff86eb4ad402ac90ba7bdaed9600cca
      CIBW_BEFORE_ALL_LINUX: >-
        bash -c 'set -eu;
        echo "=== compiler ===";
        gcc --version;
        g++ --version;
        g++ -dM -E -x c++ /dev/null | grep -E "__GNUC__|__GNUC_MINOR__|__GNUC_PATCHLEVEL__";
        echo "=== glibc ===";
        getconf GNU_LIBC_VERSION;
        echo "=== libstdc++ ===";
        libstdcxx="$(g++ -print-file-name=libstdc++.so.6)";
        echo "libstdc++=${libstdcxx}";
        strings "${libstdcxx}" | grep -E "^GLIBCXX_[0-9]" | sort -V | tail -n 1;
        echo "=== auditwheel ===";
        auditwheel --version'
        && bash /project/scripts/build_manylinux_zenohc.sh /opt/zenohc-stage
      CIBW_ENVIRONMENT_LINUX: >-
        CMAKE_ARGS="-DSITOS_ZENOHC_ROOT=/opt/zenohc-stage"
        LD_LIBRARY_PATH=/opt/zenohc-stage/lib
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel}
      CIBW_TEST_REQUIRES: pytest==8.3.3
      CIBW_TEST_COMMAND: python -m pytest {project}/tests/python -q
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install pinned wheel tools
        run: python -m pip install cibuildwheel==4.1.0 build==1.2.2 auditwheel==6.1.0
      - name: Build and test repaired wheels
        run: python -m cibuildwheel --output-dir wheelhouse python
      - name: Validate wheel contents and manylinux policy
        run: |
          set -eu
          for wheel in wheelhouse/*.whl; do
            python scripts/check_wheel.py "$wheel"
            auditwheel show "$wheel" | tee "${wheel}.auditwheel.txt"
            grep --fixed-strings "manylinux_2_28_x86_64" "${wheel}.auditwheel.txt"
          done
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: sitos-wheels-linux
          path: wheelhouse/*.whl
          if-no-files-found: error

  windows:
    name: Windows CPython wheels
    runs-on: windows-latest
    env:
      CIBW_BUILD: cp310-win_amd64 cp311-win_amd64 cp312-win_amd64 cp313-win_amd64
      CIBW_ARCHS_WINDOWS: AMD64
      CIBW_BEFORE_BUILD: >-
        python {project}/scripts/stage_zenohc.py C:/sitos-zenohc-stage
        --platform windows
      CIBW_ENVIRONMENT_WINDOWS: >-
        CMAKE_ARGS="-DSITOS_ZENOHC_ROOT=C:/sitos-zenohc-stage"
      CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >-
        delvewheel repair --add-path C:/sitos-zenohc-stage/bin
        -w {dest_dir} {wheel}
      CIBW_TEST_REQUIRES: pytest==8.3.3
      CIBW_TEST_COMMAND: python -m pytest {project}/tests/python -q
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install pinned wheel tools
        shell: pwsh
        run: python -m pip install cibuildwheel==4.1.0 build==1.2.2 delvewheel==1.1.3
      - name: Build and test repaired wheels
        shell: pwsh
        run: python -m cibuildwheel --output-dir wheelhouse python
      - name: Validate wheel contents
        shell: pwsh
        run: |
          Get-ChildItem wheelhouse\*.whl | ForEach-Object {
            python scripts/check_wheel.py $_.FullName
          }
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: sitos-wheels-windows
          path: wheelhouse/*.whl
          if-no-files-found: error
