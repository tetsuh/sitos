name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  transport-isolation:
    # Acceptance criterion #2 for issue #3: the raw zenoh-c API must stay
    # confined to src/transport/. Fail if any source file outside that
    # directory includes a zenoh header.
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Verify zenoh headers are confined to src/transport/
        # Acceptance criterion #2 for issue #3: library code (include/ and
        # src/) must not depend on raw zenoh headers except in src/transport/.
        # Tests may use raw zenoh directly for build-integration smoke checks.
        run: |
          set -e
          matches=$(grep -rnE '^[[:space:]]*#include.*zenoh' \
                    --include='*.cpp' --include='*.hpp' --include='*.h' --include='*.cc' \
                    include src | grep -v '^src/transport/' || true)
          if [ -n "$matches" ]; then
            echo "::error::Raw zenoh includes found in library code outside src/transport/:"
            echo "$matches"
            exit 1
          fi
          echo "OK: no zenoh includes in library code outside src/transport/"

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev

      - name: Configure
        run: cmake --preset dev-linux

      - name: Build
        run: cmake --build --preset dev-linux

      - name: Test
        run: ctest --preset dev-linux

      - name: Fixture validator (Python/struct independent check)
        run: python tests/fixtures/validate_fixtures.py

  python-param-store-integration:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev python3-dev python3-pip
          python3 -m pip install --break-system-packages nanobind==2.9.2 numpy==2.4.2 pytest==8.3.3

      - name: Configure and build Python binding and fixture
        run: |
          nanobind_dir="$(python3 -c 'import nanobind; print(nanobind.cmake_dir())')"
          cmake -S . -B build/python -G Ninja \
            -DCMAKE_PREFIX_PATH="$nanobind_dir" \
            -DSITOS_BUILD_PYTHON=ON -DSITOS_BUILD_TESTS=ON -DSITOS_WITH_ZENOH=ON \
            -DSITOS_PYTHON_TEST_SUPPORT=ON -DCMAKE_BUILD_TYPE=Debug
          cmake --build build/python --parallel 2

      - name: Run Python client tests
        run: |
          extension="$(find build/python -maxdepth 1 -name '_sitos*.so' -print -quit)"
          test -n "$extension"
          cp "$extension" python/sitos/
          export LD_LIBRARY_PATH="$PWD/build/python/_deps/zenohc-src/lib:${LD_LIBRARY_PATH:-}"
          export PYTHONPATH="$PWD/python"
          export SITOS_PYTHON_CACHE_FIXTURE="$PWD/build/python/tests/sitos_python_param_cache_fixture"
          export SITOS_PYTHON_FIXTURE="$PWD/build/python/tests/sitos_python_param_store_fixture"
          export SITOS_PYTHON_NODE_LIVE=1
          python3 -m pytest \
            tests/python/test_param_value.py \
            tests/python/test_numpy_zero_copy.py \
            tests/python/test_param_store.py \
            tests/python/test_param_cache.py \
            tests/python/test_param_cache_live.py \
            tests/python/test_storage_node.py tests/python/test_storage_node_gil.py \
            tests/python/test_storage_node_live.py -q
          rm -f python/sitos/_sitos*.so

  lifecycle-sanitizers:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tsan
            option: SITOS_ENABLE_TSAN=ON
          - name: asan-ubsan
            option: SITOS_ENABLE_ASAN_UBSAN=ON
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Configure
        run: >-
          cmake -S . -B build/sanitizer-${{ matrix.name }} -G Ninja
          -DCMAKE_BUILD_TYPE=Debug -DSITOS_BUILD_TESTS=ON
          -DSITOS_WITH_ZENOH=OFF -D${{ matrix.option }}

      - name: Build
        run: cmake --build build/sanitizer-${{ matrix.name }} --parallel 2

      - name: Run lifecycle tests
        env:
          TSAN_OPTIONS: halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: >-
          ctest --test-dir build/sanitizer-${{ matrix.name }}
          --output-on-failure -R 'StorageNodeLifecycleTest|StorageNodeSessionTest|StorageNodeBatchTest|TransportGetCompletionTest|ParamCacheTest|ParamCacheReadTest|SessionViewTest|SessionViewFixture'

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Configure, build and test (MSVC + Ninja)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          cmd /c "call `"$vsPath\VC\Auxiliary\Build\vcvars64.bat`" && cmake --preset dev-windows && cmake --build --preset dev-windows && ctest --preset dev-windows"

      - name: Fixture validator (Python/struct independent check)
        run: python tests/fixtures/validate_fixtures.py

  package-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libssl-dev

      - name: Validate installed consumers and relocation
        run: >-
          cmake
          -DSITOS_SOURCE_DIR="$GITHUB_WORKSPACE"
          -DWORK_DIR="$GITHUB_WORKSPACE/build/package-validation"
          -DCMAKE_GENERATOR=Ninja
          -P tests/package/validate_installed_package.cmake

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate installed consumers and relocation (MSVC + Ninja)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $workspace = $env:GITHUB_WORKSPACE.Replace('\', '/')
          $command = "call `"$vsPath\VC\Auxiliary\Build\vcvars64.bat`" && cmake -DSITOS_SOURCE_DIR=`"$workspace`" -DWORK_DIR=`"$workspace/build/package-validation`" -DCMAKE_GENERATOR=Ninja -P `"$workspace/tests/package/validate_installed_package.cmake`""
          cmd /c $command
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
